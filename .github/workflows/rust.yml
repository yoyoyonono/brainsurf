name: Windows Build

on:
  push:
    tags:
      - "v*"   # only run on version tags

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release
        run: cargo build --release

      - name: Install dependencies (7-Zip + xdelta)
        run: choco install 7zip xdelta3 -y

      - name: Prepare package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package

          # App binary
          Copy-Item target/release/*.exe package/

          # 7-Zip
          Copy-Item "C:\Program Files\7-Zip\7z.exe" package/

          # xdelta
          Copy-Item "C:\ProgramData\chocolatey\bin\xdelta3.exe" package/

      - name: Create ZIP package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $zipname = "brainsurf-$version-windows.zip"
          Compress-Archive -Path package\* -DestinationPath $zipname
          Write-Output "ZIP created: $zipname"

      - name: Upload Release Asset (create release)
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
