name: Windows Build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  release:
    types: [created, published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout correct commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref_name }}

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release
        run: cargo build --release

      # Install 7-Zip (provides 7z.exe)
      - name: Install 7-Zip
        run: choco install 7zip -y

      # Download xdelta (prebuilt binary)
      - name: Download xdelta
        shell: pwsh
        run: |
          $url = "https://github.com/jmacd/xdelta/releases/download/v3.1.0/xdelta3-3.1.0-x86_64.exe.zip"
          Invoke-WebRequest -Uri $url -OutFile xdelta.zip
          Expand-Archive xdelta.zip -DestinationPath xdelta
          Get-ChildItem -Recurse xdelta

      # Prepare packaging directory
      - name: Prepare package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package

          # Copy your app
          Copy-Item target/release/*.exe package/

          # Copy 7z.exe from installed location
          Copy-Item "C:\Program Files\7-Zip\7z.exe" package/

          # Copy xdelta exe
          Copy-Item xdelta\*.exe package/

      - name: Create ZIP package
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name || github.ref_name }}"
          $zipname = "brainsurf-$version-windows.zip"
          Compress-Archive -Path package\* -DestinationPath $zipname
          Write-Output "ZIP created: $zipname"

      # CI artifact (non-release builds)
      - name: Upload CI Artifact
        if: >
          github.event_name != 'release'
          && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-zip
          path: "*.zip"

      # Tag push → upload to release
      - name: Upload Release Asset (tag push)
        if: startsWith(github.ref, 'refs/tags/') && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Manual release → upload
      - name: Upload Release Asset (release event)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
