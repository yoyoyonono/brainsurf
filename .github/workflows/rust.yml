name: Windows Build

on:
  push:
    branches:
      - "**"
  pull_request:
  release:
    types: [created, published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    if: github.event_name != 'release'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release
        run: cargo build --release

      - name: Upload artifact (commit-scoped)
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.sha }}
          path: target/release/*.exe

  release:
    runs-on: windows-latest
    if: github.event_name == 'release'

    steps:
      - name: Download artifact from commit
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: Windows Build
          commit: ${{ github.event.release.target_commitish }}
          name: windows-build-${{ github.event.release.target_commitish }}
          path: downloaded

      - name: Install dependencies (7-Zip + xdelta)
        run: choco install 7zip xdelta3 -y

      - name: Prepare package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package

          # App binary from CI artifact
          Copy-Item downloaded\*.exe package/

          # 7-Zip
          Copy-Item "C:\Program Files\7-Zip\7z.exe" package/

          # xdelta
          Copy-Item "C:\ProgramData\chocolatey\bin\xdelta3.exe" package/

      - name: Create ZIP package
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}"
          $zipname = "brainsurf-$version-windows.zip"
          Compress-Archive -Path package\* -DestinationPath $zipname
          Write-Output "ZIP created: $zipname"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
